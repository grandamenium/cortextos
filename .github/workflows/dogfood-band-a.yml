name: Dogfood Band A

on:
  pull_request:
    branches: [main, master]

jobs:
  band-a:
    name: Band A static gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Band A static dogfood gates
        env:
          DOGFOOD_OUTPUT_DIR: dogfood-band-a-report
        run: npm run dogfood:band-a -- --static

      - name: Upload Band A evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dogfood-band-a-report
          path: dogfood-band-a-report
