name: CI

on:
  push:
    branches: [main, master, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build CLI
        run: npm run build

      - name: Verify CLI binary
        run: node dist/cli.js --help

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    env:
      CTX_INSTANCE_ID: ci-test
      CTX_ORG: testorg
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install dashboard dependencies
        run: npm ci --prefix dashboard

      - name: Run unit tests
        run: npm test

      - name: Run codex parity tests
        run: npm run test:codex

  integration-tests:
    name: Integration Tests (DB)
    runs-on: ubuntu-latest
    needs: build
    # Allow-fail for the first 24h post-landing per top-g 2026-05-17 directive
    # (msg 1778991694986). Catches CI-only flakes (service container timing,
    # pg version surprises, psql client behavior) without blocking real PRs.
    # Flip required-for-merge in a separate one-line PR after 24h clean run.
    continue-on-error: true
    env:
      CTX_INSTANCE_ID: ci-integration
      CTX_ORG: testorg
      # spawn-claim.ts:79 reads SUPABASE_GBRAIN_DATABASE_URL exclusively (both
      # the prod code path AND the describeIfDb test gate accept it), so one
      # env var activates the full stack against the service container.
      SUPABASE_GBRAIN_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      # Vanilla postgres:16-alpine has no SSL support. PGSSL_DISABLE=1 is the
      # symmetric escape hatch to PGSSL_NO_VERIFY=1 — verified TLS stays the
      # default (spawn-claim.ts:94 against Supabase prod).
      PGSSL_DISABLE: '1'
    services:
      postgres:
        # PG16-alpine: cortextos.spawn_leases (migration 0002) uses NULLS NOT
        # DISTINCT on the active-artifact partial unique index — a PG15+
        # feature. Alpine for fast pull / small image.
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Bootstrap Supabase-managed roles (vanilla-pg only)
        run: |
          PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres \
            -v ON_ERROR_STOP=1 -f supabase/test-fixtures/00-supabase-roles.sql

      - name: Apply cortextos migrations
        run: |
          for m in supabase/migrations/0001_*.sql supabase/migrations/0002_*.sql supabase/migrations/0003_*.sql; do
            echo "applying $(basename "$m")"
            PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres -v ON_ERROR_STOP=1 -f "$m"
          done

      - name: Run DB-backed integration tests
        # --no-file-parallelism: the two integration test files share the
        # cortextos.spawn_leases table. spawn-lease.test.ts has unscoped
        # listSpawnLeases() assertions that assume exclusive DB ownership;
        # daemon-spawn-lease-cross-process.test.ts uses prefix-scoped DELETE
        # in beforeEach to preserve its own rows. Running in parallel exposes
        # the isolation gap. Serialize until the unit-style file is refactored
        # to scope every list call (or the suite is split into separate DBs).
        run: |
          npx vitest run --no-file-parallelism \
            tests/integration/spawn-lease.test.ts \
            tests/integration/daemon-spawn-lease-cross-process.test.ts

  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    env:
      # Build-only credentials. Configure CI_AUTH_SECRET and CI_ADMIN_PASSWORD
      # in repo settings (Settings > Secrets and variables > Actions) to override.
      # Fallback values are only used for local build/typecheck and must never
      # be used in production environments.
      AUTH_SECRET: ${{ secrets.CI_AUTH_SECRET || 'ci-fallback-do-not-use-in-prod' }}
      AUTH_TRUST_HOST: 'true'
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD || 'ci-fallback' }}
      CTX_INSTANCE_ID: ci-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Type check dashboard
        run: npx tsc --noEmit

      - name: Build dashboard
        run: npm run build
