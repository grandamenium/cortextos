    chat_id_env_var: CHAT_ID
    env_path: /Users/hari/cortextos/orgs/subbu-ops/agents/pa/.env
    verified: true
    notes: "Swapna — Hari's personal assistant on Ollama gemma4:31b. Has a working BOT_TOKEN; config sets telegram_polling=true. Updated from initial guess of false after .env inspection."

  warden-mb:
