# Per-agent manifest for the cortextOS multi-host fleet.
# Source of truth for "does this agent have Telegram?" so bootstrap/auth code
# does not blindly probe agents that were never wired (e.g. forge by design).
#
# verified: true   = .env / config.json was inspected for this run
# verified: false  = best-guess based on prior session knowledge (host not
#                    directly accessible from this build session — Mac mini)
hosts:
  macbook:
    user: hari
    agents: [sam, warden-mb, pa, compute, media]   # compute + media dormant
  mac_mini:
    user: subbu_ai_assistant
    agents:
      - analyst
      - blueteam
      - chief
      - dev
      - forge
      - graphify-out      # dormant
      - home-net
      - redteam
      - research
      - research-codex
      - research-director
      - security-vp
      - warden-mm

agents:
  sam:
    host: macbook
    org: subbu-ops
    role: telegram_orchestrator
    telegram_enabled: true
    bot_token_env_var: BOT_TOKEN
    chat_id_env_var: CHAT_ID
    env_path: /Users/hari/cortextos/orgs/subbu-ops/agents/sam/.env
    verified: true
    notes: "Primary inbound Telegram for Hari (@sam1491_bot). Also holds HARPAL_RESEARCH_BOT_TOKEN for research relay."

  pa:
    host: macbook
    org: subbu-ops
    role: personal_assistant
